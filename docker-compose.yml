version: '3'

services:

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/contacts
    depends_on:
      - mongo

  mongo:
    image: mongo
    ports:
      - "27017:27017"